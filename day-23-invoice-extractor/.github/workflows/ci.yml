name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]

      - run: mypy invoice_extractor
      - run: flake8 invoice_extractor
      - run: pytest --cov=invoice_extractor --cov-report=term-missing