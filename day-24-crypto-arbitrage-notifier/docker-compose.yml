services:
  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
    command: ["uvicorn", "arbitrage_notifier.api.app:app", "--host", "0.0.0.0", "--port", "8000", "--timeout-keep-alive", "5"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"